<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyboard Typing Trainer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div id="mode-tabs">
        <button id="tab-learning" class="mode-tab">Apprentissage</button>
        <button id="tab-training" class="mode-tab">Entraînement</button>
        <button id="tab-free" class="mode-tab">Libre</button>
      </div>
    </header>
    <main>
      <div id="level-bar">
        <div id="level-nav"></div>
        <button id="free-action" class="hidden" disabled>Commencer · Ctrl+Entrée</button>
      </div>
      <div id="text-display"></div>
      <div id="keyboard-area">
        <div id="keyboard-display" class="keyboard-container"></div>
        <div id="layout-picker" class="layout-picker">
          <button id="lang-toggle" class="picker-btn" title="Language">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 8l6 6"/>
              <path d="M4 14l6-6 2-3"/>
              <path d="M2 5h12"/>
              <path d="M7 2h1"/>
              <path d="M22 22l-5-10-5 10"/>
              <path d="M14 18h6"/>
            </svg>
          </button>
          <div id="lang-menu" class="picker-menu hidden">
            <button class="lang-option" data-lang="en">English</button>
            <button class="lang-option" data-lang="fr">Français</button>
          </div>
          <button id="layout-globe" class="picker-btn" title="Keyboard layout">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
          </button>
          <div id="layout-menu" class="picker-menu hidden">
            <button class="layout-option" data-layout="QWERTY">QWERTY</button>
            <button class="layout-option" data-layout="AZERTY">AZERTY</button>
          </div>
        </div>
      </div>
      <div id="stats">
        <div class="stat">
          <span class="stat-label">Speed</span>
          <span class="stat-value" id="stat-cpm">0</span>
          <span class="stat-unit">CPM</span>
        </div>
        <div class="stat">
          <span class="stat-label">Success</span>
          <span class="stat-value" id="stat-success">100</span>
          <span class="stat-unit">%</span>
        </div>
      </div>
    </main>
    <textarea id="input-capture" aria-hidden="true"></textarea>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
